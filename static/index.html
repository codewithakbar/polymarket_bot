<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <h1>Polymarket Tracker</h1>
            <p id="target-user">@bossoskil1</p>
        </header>

        <nav>
            <button class="nav-btn active" data-tab="positions">Positions</button>
            <button class="nav-btn" data-tab="activity">Activity</button>
            <button class="nav-btn" data-tab="leaderboard">Leaderboard</button>
            <button class="nav-btn" data-tab="my-profile">My Profile</button>
        </nav>

        <main id="content">
            <div id="filters" class="filters-container" style="display: none;">
                <input type="text" id="search-input" placeholder="Qidirish (bozor nomi)..." class="filter-input">
                <select id="type-filter" class="filter-input" style="display: none;">
                    <option value="all">Barchasi</option>
                    <option value="BUY">Sotib olingan</option>
                    <option value="SELL">Sotilgan</option>
                </select>
                <select id="outcome-filter" class="filter-input" style="display: none;">
                    <option value="all">Barchasi</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
                <input type="date" id="date-filter" class="filter-input" style="display: none;">
            </div>
            <div id="loader" class="loader"></div>
            <div id="data-container"></div>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
